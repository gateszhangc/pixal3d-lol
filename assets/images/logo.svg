<svg width="180" height="48" viewBox="0 0 180 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cubeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf7"/>
    </linearGradient>
    <linearGradient id="cubeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cubeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <!-- 3D Cube icon -->
  <g transform="translate(4, 8)">
    <!-- Top face -->
    <polygon points="24,0 44,10 24,20 4,10" fill="url(#cubeGrad1)" opacity="0.9"/>
    <!-- Right face -->
    <polygon points="44,10 44,28 24,38 24,20" fill="url(#cubeGrad2)" opacity="0.85"/>
    <!-- Left face -->
    <polygon points="24,20 24,38 4,28 4,10" fill="url(#cubeGrad3)" opacity="0.75"/>
    <!-- Wireframe highlights -->
    <polygon points="24,0 44,10 24,20 4,10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
    <polygon points="44,10 44,28 24,38 24,20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="24,20 24,38 4,28 4,10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <!-- Small grid dots on faces -->
    <circle cx="14" cy="16" r="0.8" fill="rgba(255,255,255,0.4)"/>
    <circle cx="34" cy="16" r="0.8" fill="rgba(255,255,255,0.4)"/>
    <circle cx="24" cy="10" r="0.8" fill="rgba(255,255,255,0.4)"/>
    <circle cx="34" cy="24" r="0.8" fill="rgba(255,255,255,0.3)"/>
    <circle cx="14" cy="24" r="0.8" fill="rgba(255,255,255,0.3)"/>
    <circle cx="24" cy="30" r="0.8" fill="rgba(255,255,255,0.3)"/>
    <circle cx="24" cy="20" r="0.8" fill="rgba(255,255,255,0.5)"/>
  </g>
  <!-- Text -->
  <text x="56" y="32" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="url(#logoGrad)" letter-spacing="-0.5">Pixal</text>
  <text x="108" y="32" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="300" fill="#94a3b8" letter-spacing="-0.5">3D</text>
</svg>
